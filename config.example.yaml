# simple-blocker configuration (YAML).
# A JSON equivalent (config.example.json) is also provided; the format is
# selected by file extension.

# Name of the ipset / nftables set that holds banned addresses.
ipset_name: simple_blacklist

# Unix socket the daemon serves live status on (read-only), and that
# `simple-blocker status` reads. Defaults to /run/simple-blocker.sock.
control_socket: /run/simple-blocker.sock

# Sliding window over which offenses are counted. Go duration syntax.
window: 3h

# Manual overrides. Each entry is a single IP (v4 or v6), an inclusive range
# "FROM-TO", or a CIDR block. Whitelist wins over blacklist.
#   whitelist: addresses the daemon must never ban (even if they trip a pattern).
#   blacklist: addresses banned permanently the moment they trip a pattern.
# Edit live with `simple-blocker whitelist|blacklist add|remove <spec>`; the
# daemon applies changes within a couple of seconds without a restart.
# IPv6 entries are honored for matching always; IPv6 *enforcement* (banning)
# requires firewall.enforce_ipv6 below.
whitelist:
  - 203.0.113.4
  - 10.0.0.0/24
  - 192.168.1.10-192.168.1.40
  - 2001:db8::/32
blacklist:
  - 198.51.100.0/24

# Firewall enforcement.
#   mode: internal | external
#     internal  pure-Go nftables over netlink — no external binaries needed
#               (requires a kernel with nftables). This is the default.
#     external  shell out to the host's firewall tools (see backend below).
#   backend (external mode only): auto | iptables | nftables
#     auto      pick ipset+iptables when available, else nftables
#     iptables  ipset + iptables DROP rules (supports DOCKER-USER)
#     nftables  native nft set + drop rule
firewall:
  mode: internal
  backend: auto
  # iptables chains to insert the DROP rule into (external+iptables only).
  # Add DOCKER-USER when protecting containers published via Docker.
  chains:
    - INPUT
    - DOCKER-USER
  # Opt in to banning IPv6 offenders (off by default). When on, a parallel IPv6
  # ban set + drop rule is added alongside the IPv4 ones. Best-effort: a host
  # that can't install v6 rules (e.g. ip6tables/DOCKER-USER absent on a Docker
  # host without IPv6) logs and keeps enforcing IPv4. Make sure your source
  # patterns capture IPv6 (see the ssh example below) for this to do anything.
  enforce_ipv6: false

# Escalating bans: when an IP reaches an offense count within the window, it
# is banned for the matching tier's duration (highest matching tier wins).
ban_schedule:
  - { offenses: 2, ban: 10m }
  - { offenses: 3, ban: 30m }
  - { offenses: 5, ban: 1h }
  - { offenses: 7, ban: 24h }

# Log sources to monitor. Each pattern must contain a named capture group
# (?P<ip>...) that extracts the offending address.
#
# Each source has a `mode`:
#   docker:  internal (read the Docker Engine API over the unix socket, no
#            docker CLI — the default) | external (exec `docker logs`)
#   journal: always external (journalctl); internal is not supported
sources:
  # Failed SSH logins from the systemd journal (journal is always external).
  # The capture group is dual-stack: it matches IPv4, bare IPv6, and bracketed
  # IPv6 (e.g. "from [2001:db8::1]:443"). The captured token is validated by the
  # daemon (non-IPs are ignored), so a permissive class is safe. For IPv4 only,
  # use: (?P<ip>\d{1,3}(?:\.\d{1,3}){3})
  - type: journal
    name: ssh
    target: ssh
    since: -1d
    pattern: 'Invalid user \S+ from \[?(?P<ip>[0-9a-fA-F:.]+)\]?'

  # Vulnerability probes hitting a Docker container (404s to risky paths).
  # Uncomment and set the container name to enable.
  # - type: docker
  #   name: nginx
  #   target: my-nginx-1
  #   mode: internal                  # internal (Docker API) | external (docker logs)
  #   docker_host: /var/run/docker.sock  # optional socket override (internal mode)
  #   pattern: '(?P<ip>\d{1,3}(?:\.\d{1,3}){3})\s.*?"[A-Z]+\s+\S*\.(?:php|exe|xml|gz)\S*\s+HTTP/\d\.\d".*\s404\s'

  # Vulnerability probes in a plain log file (e.g. an nginx access log). The
  # daemon reads the file from the start, follows it live, and survives log
  # rotation. The optional (?P<ts>...) group plus `since` skip lines older than
  # the window so a restart doesn't re-count old hits; without a ts group the
  # whole file is read each start. Lines whose timestamp can't be parsed are
  # skipped (fail-closed). `time_format` overrides the auto-detected layout.
  # - type: file
  #   name: nginx-file
  #   target: /var/log/nginx/access.log
  #   since: -1d
  #   # time_format: '02/Jan/2006:15:04:05 -0700'   # optional layout override
  #   pattern: '(?P<ip>\d{1,3}(?:\.\d{1,3}){3})\s.*\[(?P<ts>[^\]]+)\]\s"[A-Z]+\s+\S*\.(?:php|exe|xml|gz|env)\S*\s+HTTP/\d\.\d".*\s404\s'
