# simple-blocker configuration (YAML).
# A JSON equivalent (config.example.json) is also provided; the format is
# selected by file extension.

# Name of the ipset / nftables set that holds banned addresses.
ipset_name: simple_blacklist

# Unix socket the daemon serves live status on (read-only), and that
# `simple-blocker status` reads. Defaults to /run/simple-blocker.sock.
control_socket: /run/simple-blocker.sock

# Sliding window over which offenses are counted. Go duration syntax.
window: 3h

# Firewall enforcement.
#   mode: internal | external
#     internal  pure-Go nftables over netlink — no external binaries needed
#               (requires a kernel with nftables). This is the default.
#     external  shell out to the host's firewall tools (see backend below).
#   backend (external mode only): auto | iptables | nftables
#     auto      pick ipset+iptables when available, else nftables
#     iptables  ipset + iptables DROP rules (supports DOCKER-USER)
#     nftables  native nft set + drop rule
firewall:
  mode: internal
  backend: auto
  # iptables chains to insert the DROP rule into (external+iptables only).
  # Add DOCKER-USER when protecting containers published via Docker.
  chains:
    - INPUT
    - DOCKER-USER

# Escalating bans: when an IP reaches an offense count within the window, it
# is banned for the matching tier's duration (highest matching tier wins).
ban_schedule:
  - { offenses: 2, ban: 10m }
  - { offenses: 3, ban: 30m }
  - { offenses: 5, ban: 1h }
  - { offenses: 7, ban: 24h }

# Log sources to monitor. Each pattern must contain a named capture group
# (?P<ip>...) that extracts the offending address.
#
# Each source has a `mode`:
#   docker:  internal (read the Docker Engine API over the unix socket, no
#            docker CLI — the default) | external (exec `docker logs`)
#   journal: always external (journalctl); internal is not supported
sources:
  # Failed SSH logins from the systemd journal (journal is always external).
  - type: journal
    name: ssh
    target: ssh
    since: -1d
    pattern: 'Invalid user \S+ from (?P<ip>\d{1,3}(?:\.\d{1,3}){3})'

  # Vulnerability probes hitting a Docker container (404s to risky paths).
  # Uncomment and set the container name to enable.
  # - type: docker
  #   name: nginx
  #   target: my-nginx-1
  #   mode: internal                  # internal (Docker API) | external (docker logs)
  #   docker_host: /var/run/docker.sock  # optional socket override (internal mode)
  #   pattern: '(?P<ip>\d{1,3}(?:\.\d{1,3}){3})\s.*?"[A-Z]+\s+\S*\.(?:php|exe|xml|gz)\S*\s+HTTP/\d\.\d".*\s404\s'
